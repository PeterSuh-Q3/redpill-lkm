name: Build lkms mshell with toolchain dockerhub

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  release:
    types: [published]

  workflow_dispatch:
    inputs:
      version:
        description: "format %y.%-m.$i or auto"
        required: false
        type: string
      prerelease:
        description: "pre release"
        default: false
        type: boolean

jobs:
  build:
    strategy:
      matrix:
        include:
          #- version: 7.1
          #  platforms: 'epyc7002'
          #  parm: 'prod-v7'
          #  kernel_ver: '5.10.55'

          #- version: 7.2
          #  platforms: 'epyc7002 v1000nk r1000nk geminilakenk'
          #  parm: 'prod-v7'
          #  kernel_ver: '5.10.55'

          - version: 7.3
            platforms: 'epyc7002 v1000nk r1000nk geminilakenk'
            parm: 'prod-v7'
            kernel_ver: '5.10.55'

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Init Env
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          sudo timedatectl set-timezone "Asia/Seoul"

      - name: Cache Docker Image
        id: docker-cache
        uses: actions/cache@v4
        with:
          path: /tmp/docker-image-${{ matrix.version }}.tar
          key: docker-syno-compiler-${{ matrix.version }}

      - name: Load or Pull Docker Image
        run: |
          if [ -f /tmp/docker-image-${{ matrix.version }}.tar ]; then
            echo "Loading cached image..."
            docker load < /tmp/docker-image-${{ matrix.version }}.tar
          else
            echo "Pulling image from registry..."
            docker pull dante90/syno-compiler:${{ matrix.version }}
            docker save dante90/syno-compiler:${{ matrix.version }} > /tmp/docker-image-${{ matrix.version }}.tar
          fi

      - name: Compile LKMs via Docker (dante90/syno-compiler)
        run: |
          ROOT_PATH=${{ github.workspace }}
          VERSION=${{ matrix.version }}
          TOOLKIT_VER=${VERSION}
          KERNEL_VER=${{ matrix.kernel_ver }}
          PARM="${{ matrix.parm }}"
          RP_TARGET="${PARM%%-*}"
          RP_TARGET_VER="${PARM##*v}"

          mkdir -p "${ROOT_PATH}/source/output"

          for PLATFORM in ${{ matrix.platforms }}; do
            echo "=== Compiling for ${PLATFORM} (DSM ${VERSION}, kernel ${KERNEL_VER}, target=${RP_TARGET}) ==="
            mkdir -p "/tmp/${PLATFORM}-${VERSION}"
            chmod 777 "/tmp/${PLATFORM}-${VERSION}"

            docker run --privileged --rm -t \
              -e RP_MODULE_TARGET="${RP_TARGET}" \
              -e RP_MODULE_TARGET_VER="${RP_TARGET_VER}" \
              -v "${ROOT_PATH}":/input \
              -v "/tmp/${PLATFORM}-${VERSION}":/output \
              dante90/syno-compiler:${TOOLKIT_VER} compile-module ${PLATFORM}

            KO_NAME="rp-${PLATFORM}-${VERSION}-${KERNEL_VER}-${RP_TARGET}.ko"
            if [ -f /tmp/${PLATFORM}-${VERSION}/redpill.ko ]; then
              cp /tmp/${PLATFORM}-${VERSION}/redpill.ko "${ROOT_PATH}/source/output/${KO_NAME}"
              gzip -9 "${ROOT_PATH}/source/output/${KO_NAME}"
              echo "Created: ${KO_NAME}.gz"
            fi

            rm -rf /tmp/${PLATFORM}-${VERSION}
          done

      - name: Upload to Artifacts
        uses: actions/upload-artifact@v5
        with:
          name: rp-lkms-${{ matrix.version }}
          path: |
            ${{ github.workspace }}/source/output/*.ko.gz

      - name: Clean
        run: |
          sudo rm -rf ${{ github.workspace }}/source/*

  release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@main
        with:
          fetch-depth: 0

      - name: Changelog
        uses: Bullrich/generate-release-changelog@master
        id: Changelog
        env:
          REPO: ${{ github.repository }}

      - name: Init Env
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          sudo timedatectl set-timezone "Asia/Seoul"

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: ./rp-lkms

      - name: Calculate Version
        run: |
          VERSION=""
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            TODAY="$(date +'%y.%-m.%-d')"
            LATEST_TAG="$(curl -skL "https://api.github.com/repos/${{ github.repository }}/releases/latest" | jq -r ".tag_name" 2>/dev/null)"
            if [[ -n "${LATEST_TAG}" && "${LATEST_TAG}" = "${TODAY}" ]]; then
              VERSION="${TODAY}.1"
            else
              VERSION="${TODAY}"
            fi
          fi

          if [ -n "${VERSION}" ]; then
            echo "Version: ${VERSION}"
            echo "${VERSION}" >VERSION
            mkdir -p "./rp-lkms"
            echo "${VERSION}" >"./rp-lkms/VERSION"
            echo "VERSION=${VERSION}" >> $GITHUB_ENV
          fi

      - name: Zip Lkms
        if: env.VERSION != ''
        run: |
          find rp-lkms -name "*.ko.gz" -exec cp {} . \;
          cp rp-lkms/VERSION . 2>/dev/null || true
          ls -la *.ko.gz
          zip -9 rp-lkms.zip *.ko.gz VERSION

      - name: Release
        uses: softprops/action-gh-release@v1
        if: env.VERSION != ''
        with:
          tag_name: ${{ env.VERSION }}
          prerelease: ${{ inputs.prerelease }}
          body: |
            ${{ steps.Changelog.outputs.changelog }}
          files: |
            rp-lkms.zip

name: Build lkms mshell with toolchain dockerhub

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  release:
    types: [published]

  workflow_dispatch:
    inputs:
      version:
        description: "format %y.%-m.$i or auto"
        required: false
        type: string
      prerelease:
        description: "pre release"
        default: false
        type: boolean

jobs:
  build:
    strategy:
      matrix:
        include:
          - version: 7.1
            platform: epyc7002
            parm: 'prod-v7'
            toolkit_ver: '7.1'

          - version: 7.2
            platform: epyc7002
            parm: 'prod-v7'
            toolkit_ver: '7.2'
          - version: 7.2
            platform: v1000nk
            parm: 'prod-v7'
            toolkit_ver: '7.2'
          - version: 7.2
            platform: r1000nk
            parm: 'prod-v7'
            toolkit_ver: '7.2'
          - version: 7.2
            platform: geminilakenk
            parm: 'prod-v7'
            toolkit_ver: '7.2'

          - version: 7.3
            platform: epyc7002
            parm: 'prod-v7'
            toolkit_ver: '7.3'
          - version: 7.3
            platform: v1000nk
            parm: 'prod-v7'
            toolkit_ver: '7.3'
          - version: 7.3
            platform: r1000nk
            parm: 'prod-v7'
            toolkit_ver: '7.3'
          - version: 7.3
            platform: geminilakenk
            parm: 'prod-v7'
            toolkit_ver: '7.3'

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Init Env
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          sudo timedatectl set-timezone "Asia/Seoul"

      - name: Compile LKMs via Docker (dante90/syno-compiler)
        run: |
          ROOT_PATH=${{ github.workspace }}
          PLATFORM=${{ matrix.platform }}
          VERSION=${{ matrix.version }}
          TOOLKIT_VER=${{ matrix.toolkit_ver }}
          DIR="${VERSION}"

          # 소스 디렉토리가 없으면 스킵
          [ ! -d "${ROOT_PATH}/${DIR}" ] && echo "No source dir ${DIR}, skipping." && exit 0

          mkdir -p "/tmp/${PLATFORM}-${VERSION}"

          # dante90/syno-compiler 도커 이미지로 모듈 컴파일
          docker run --privileged -u $(id -u) --rm -t \
            -v "${ROOT_PATH}/${DIR}":/input \
            -v "/tmp/${PLATFORM}-${VERSION}":/output \
            dante90/syno-compiler:${TOOLKIT_VER} compile-module ${PLATFORM}

          # 컴파일 결과물 정리: pats 원본 모듈 우선, 없으면 컴파일본 사용
          for M in $(ls /tmp/${PLATFORM}-${VERSION}); do
            PLATFORM_DIR="${PLATFORM}-${TOOLKIT_VER}-${VERSION}"
            mkdir -p "${ROOT_PATH}/source/output/${PLATFORM_DIR}"
            if [ -f ~/src/pats/modules/${PLATFORM}/$M ]; then
              # original
              cp ~/src/pats/modules/${PLATFORM}/$M "${ROOT_PATH}/source/output/${PLATFORM_DIR}/"
            else
              # compiled
              cp /tmp/${PLATFORM}-${VERSION}/$M "${ROOT_PATH}/source/output/${PLATFORM_DIR}/"
            fi
          done

          rm -rf /tmp/${PLATFORM}-${VERSION}

      - name: Upload to Artifacts
        uses: actions/upload-artifact@v5
        with:
          name: rp-lkms-${{ matrix.platform }}-${{ matrix.version }}
          path: |
            ${{ github.workspace }}/source/output/**/*

      - name: Clean
        run: |
          sudo rm -rf ${{ github.workspace }}/source/*

  release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@main
        with:
          fetch-depth: 0

      - name: Changelog
        uses: Bullrich/generate-release-changelog@master
        id: Changelog
        env:
          REPO: ${{ github.repository }}

      - name: Init Env
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          sudo timedatectl set-timezone "Asia/Seoul"

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: ./rp-lkms

      - name: Calculate Version
        run: |
          VERSION=""
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            LATEST_TAG="$(curl -skL "https://api.github.com/repos/${{ github.repository }}/releases/latest" | jq -r ".tag_name" 2>/dev/null)"
            if [[ -n "${LATEST_TAG}" && "`echo ${LATEST_TAG} | cut -d '.' -f 1,2`" = "`date +'%y.%-m.%-d'`" ]]; then
              VERSION="`echo ${LATEST_TAG} | awk -F '.' '{$3=$3+1}1' OFS='.'`"
            else
              VERSION="`date +'%y.%-m.%-d'`"
            fi
          fi

          if [ -n "${VERSION}" ]; then
            echo "Version: ${VERSION}"
            echo "${VERSION}" >VERSION
            echo "${VERSION}" >"./rp-lkms/VERSION"
            echo "VERSION=${VERSION}" >> $GITHUB_ENV
          fi

      - name: Zip Lkms
        if: env.VERSION != ''
        run: |
          zip -9 rp-lkms.zip -j rp-lkms/*

      - name: Release
        uses: softprops/action-gh-release@v1
        if: env.VERSION != ''
        with:
          tag_name: ${{ env.VERSION }}
          prerelease: ${{ inputs.prerelease }}
          body: |
            ${{ steps.Changelog.outputs.changelog }}
          files: |
            rp-lkms.zip
